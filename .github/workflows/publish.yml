name: Publish to npm

# Publish on every push to master, but only when package.json's version is not
# already on npm. Bump the version to trigger a release; ordinary pushes that
# don't change the version are skipped.
on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Run tests
        run: npm test

      - name: Check if this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is already on npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is new; will publish."
          fi

      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
